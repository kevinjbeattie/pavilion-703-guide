<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Sonos placeholder</title>
  <desc id="desc">Illustrated placeholder for the Sonos speaker or controller area.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dff3f9"/>
      <stop offset="100%" stop-color="#f7f1d3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="120" y="110" width="960" height="680" rx="36" fill="#ffffff" opacity="0.88"/>
  <rect x="320" y="240" width="560" height="180" rx="90" fill="#1f3942"/>
  <circle cx="430" cy="330" r="58" fill="#f4fafb" opacity="0.9"/>
  <circle cx="770" cy="330" r="58" fill="#f4fafb" opacity="0.9"/>
  <rect x="510" y="268" width="180" height="124" rx="18" fill="#315563"/>
  <text x="600" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#16313a">Replace with a real Sonos photo</text>
  <text x="600" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#5f7880">Speaker, controller area, or quick start setup</text>
</svg>
