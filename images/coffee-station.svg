<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Coffee station placeholder</title>
  <desc id="desc">Illustrated placeholder for the coffee maker and supplies.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8ead8"/>
      <stop offset="100%" stop-color="#f0f7ef"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect x="220" y="220" width="400" height="350" rx="34" fill="#fffdf8" stroke="#d9c7ab" stroke-width="10"/>
  <rect x="660" y="270" width="160" height="230" rx="24" fill="#16313a"/>
  <rect x="710" y="205" width="60" height="88" rx="20" fill="#16313a"/>
  <rect x="850" y="315" width="110" height="150" rx="20" fill="#ffffff" stroke="#d9c7ab" stroke-width="8"/>
  <rect x="180" y="585" width="840" height="26" rx="13" fill="#9d7a58"/>
  <text x="600" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#16313a">Replace with a real coffee station photo</text>
  <text x="600" y="765" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#5f7880">Coffee maker, filters, mugs, and supplies</text>
</svg>
